name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  SCHEME: "iCryptr (iOS)"
  BUNDLE_ID: "com.brendanlindsey.iCryptr"
  KEYCHAIN_NAME: "ci-signing.keychain"
  KEYCHAIN_PASSWORD: "ci-keychain-password"

jobs:
  # ── JOB 1: TEST (every PR and push) ──────────────────────────────────────────
  test:
    name: Run iOS Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project iCryptr.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -resultBundlePath "${{ github.workspace }}/build/TestResults.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty --color

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-${{ github.run_id }}
          path: ${{ github.workspace }}/build/TestResults.xcresult
          retention-days: 7

  # ── JOB 2: DEPLOY (push to main only, requires test to pass) ─────────────────
  deploy:
    name: Archive and Upload to TestFlight
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install distribution certificate
        env:
          P12_BASE64: ${{ secrets.DIST_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DIST_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/dist_cert.p12
          security create-keychain -p "${{ env.KEYCHAIN_PASSWORD }}" "${{ env.KEYCHAIN_NAME }}"
          security set-keychain-settings -lut 3600 "${{ env.KEYCHAIN_NAME }}"
          security unlock-keychain -p "${{ env.KEYCHAIN_PASSWORD }}" "${{ env.KEYCHAIN_NAME }}"
          security import /tmp/dist_cert.p12 \
            -k "${{ env.KEYCHAIN_NAME }}" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security list-keychains -d user -s \
            "${{ env.KEYCHAIN_NAME }}" \
            ~/Library/Keychains/login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple: -s \
            -k "${{ env.KEYCHAIN_PASSWORD }}" \
            "${{ env.KEYCHAIN_NAME }}"
          rm /tmp/dist_cert.p12

      - name: Install provisioning profiles
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          THUMBNAIL_PROFILE_BASE64: ${{ secrets.THUMBNAIL_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          for VAR in "$PROFILE_BASE64" "$THUMBNAIL_PROFILE_BASE64"; do
            echo "$VAR" | base64 --decode > /tmp/profile.mobileprovision
            UUID=$(security cms -D -i /tmp/profile.mobileprovision \
              | plutil -extract UUID xml1 -o - - \
              | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
            cp /tmp/profile.mobileprovision "$PROFILES_DIR/${UUID}.mobileprovision"
            rm /tmp/profile.mobileprovision
          done

      - name: Install App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Write ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.brendanlindsey.iCryptr</key>
              <string>${{ secrets.PROVISIONING_PROFILE_NAME }}</string>
              <key>com.brendanlindsey.iCryptr.ThumbnailProvider</key>
              <string>${{ secrets.THUMBNAIL_PROVISIONING_PROFILE_NAME }}</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>uploadBitcode</key><false/>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          mkdir -p "${{ github.workspace }}/build"
          xcodebuild archive \
            -project iCryptr.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${{ github.workspace }}/build/iCryptr.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}"

      - name: Export and upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath "${{ github.workspace }}/build/iCryptr.xcarchive" \
            -exportPath "${{ github.workspace }}/build/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_API_ISSUER_ID }}"

      - name: Remove temporary keychain
        if: always()
        run: security delete-keychain "${{ env.KEYCHAIN_NAME }}" || true
